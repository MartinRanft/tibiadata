services:
  tibiadataapi.redis:
    image: redis:7.4-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"

  tibiadataapi.api:
    image: tibiadataapi.api
    build:
      context: .
      dockerfile: TibiaDataApi.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Database__Provider: ${Database__Provider:-MariaDb}
      ConnectionStrings__Redis: ${ConnectionStrings__Redis:-host.docker.internal:6379,abortConnect=false}
      ConnectionStrings__DatabaseConnection: ${ConnectionStrings__DatabaseConnection:-Server=db.example;Port=3306;Database=tibiadataapi;User=appuser;Password=change-me;charset=utf8;Allow User Variables=True;}
      ConnectionStrings__DatabaseConnectionDev: ${ConnectionStrings__DatabaseConnectionDev:-Server=db.example;Port=3306;Database=tibiadataapi_dev;User=appuser;Password=change-me;charset=utf8;Allow User Variables=True;}
    ports:
      - "8096:8080"
