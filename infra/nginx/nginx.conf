worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format tibiadata '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'rt=$request_time ua="$upstream_addr" us="$upstream_status"';

    access_log /var/log/nginx/access.log tibiadata;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 2m;

    limit_req_zone $binary_remote_addr zone=public_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=admin_surface:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    upstream tibiadata_backend {
        server tibiadataapi.api:8080;
        keepalive 32;
    }

    map $request_uri $limit_bucket {
        default public_api;
        ~^/admin admin_surface;
        ~^/api/admin admin_surface;
    }

    server {
        listen 8080;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";

        limit_conn per_ip_conn 40;
        limit_req zone=public_api burst=50 nodelay;

        location /admin {
            limit_req zone=admin_surface burst=8 nodelay;
            proxy_pass http://tibiadata_backend;
        }

        location /api/admin {
            limit_req zone=admin_surface burst=8 nodelay;
            proxy_pass http://tibiadata_backend;
        }

        location / {
            proxy_pass http://tibiadata_backend;
        }
    }
}
